name: Percy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install
        run: pnpm i
        
      - name: Install Chrome
        run: pnpm puppeteer browsers install chrome

      - name: Set PERCY_BROWSER_EXECUTABLE env var
        run: echo "PERCY_BROWSER_EXECUTABLE=$(node -e \"console.log(require('puppeteer').executablePath())\")" >> $GITHUB_ENV

      - run: pnpm percy exec pnpm run stories:build --no-sandbox
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
