name: Percy

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install
        run: pnpm i
        
      - name: Install Chrome
        id: install_chrome
        run: |
          CHROME_INFO=$(pnpm puppeteer browsers install chrome)
          CHROME_PATH=$(echo "$CHROME_INFO" | awk '{print $2}')
          echo "chrome_path=$CHROME_PATH" >> $GITHUB_OUTPUT

      - name: Set Percy browser executable
        run: echo "PERCY_BROWSER_EXECUTABLE=${{ steps.install_chrome.outputs.chrome_path }}" >> $GITHUB_ENV

      - name: Disable AppArmor
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns

      - run: pnpm percy exec pnpm run stories:build --no-sandbox
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
